name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  base:
    name: Base steps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Check Whitespace
      run: git diff --check -- HEAD~1
  rust-build:
    name: Rust Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/cache@v5.0.5
      with:
        path: |
          target/
          ~/.cargo/bin/
          ~/.cargo/git/db/
          ~/.cargo/registry/cache/
          ~/.cargo/registry/index/
          ~/.rustup
        key: ${{ matrix.target }}-rust-${{ hashFiles('.github/workflows/ci.yml', 'Cargo.lock', 'rust-toolchain.toml') }}
    - name: Install musl-tools
      if: endsWith(matrix.target, '-musl')
      run: sudo apt-get update && sudo apt-get install -y musl-tools
    - name: Run fmt
      run: cargo fmt --check
    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}
    - name: Run clippy
      run: cargo clippy --release --target ${{ matrix.target }}
    - uses: actions/upload-artifact@v7
      with:
        name: manager-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/manager
  ruby-tests:
    name: Ruby Tests
    needs: rust-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ruby: [ruby-3.3, ruby-3.4, ruby-4.0]
        target:
          - aarch64-apple-darwin
          - aarch64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
        execution:
          - mutant run -- --zombie --since HEAD~1
          - mutant test
          - quick-start-verify
          - rspec integration generation
          - rspec integration minitest
          - rspec integration misc
          - rspec integration rspec
          - rspec unit
          - rubocop
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/download-artifact@v8
      with:
        name: manager-${{ matrix.target }}
        path: ./bin
    - run: chmod +x ./bin/manager
    # Workaround for Bundler 4.x security check on world-writable GHA runner directories.
    # See: https://github.com/ruby/rubygems/issues/7983
    - if: startsWith(matrix.os, 'ubuntu')
      run: mkdir -p /opt/hostedtoolcache/Ruby && chmod -R o-w /opt/hostedtoolcache/Ruby
    - uses: ruby/setup-ruby@v1.310.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
        cache-version: ${{ hashFiles('ruby/*.gemspec') }}
        working-directory: ./ruby
    - run: ./bin/manager ruby ${{ matrix.execution }}
  rails-tests:
    name: Rails Tests (rails ${{ matrix.rails }} / ${{ matrix.database }})
    needs: rust-build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # One representative Ruby per Rails version (Ruby x Rails compatibility),
        # each against both databases the hooks isolate. PostgreSQL is provided
        # on demand by the pg-ephemeral gem via the runner's Docker.
        include:
          - { rails: "7.2", ruby: ruby-3.3, database: postgresql }
          - { rails: "7.2", ruby: ruby-3.3, database: sqlite }
          - { rails: "8.0", ruby: ruby-3.4, database: postgresql }
          - { rails: "8.0", ruby: ruby-3.4, database: sqlite }
          - { rails: "8.1", ruby: ruby-4.0, database: postgresql }
          - { rails: "8.1", ruby: ruby-4.0, database: sqlite }
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: manager-x86_64-unknown-linux-gnu
        path: ./bin
    - run: chmod +x ./bin/manager
    # libpq headers for building the pg gem.
    - run: sudo apt-get update && sudo apt-get install -y libpq-dev
    # Workaround for Bundler 4.x security check on world-writable GHA runner directories.
    # See: https://github.com/ruby/rubygems/issues/7983
    - run: mkdir -p /opt/hostedtoolcache/Ruby && chmod -R o-w /opt/hostedtoolcache/Ruby
    - uses: ruby/setup-ruby@v1.310.0
      with:
        ruby-version: ${{ matrix.ruby }}
    # The manager runs `bundle install` itself with RAILS_VERSION set, then
    # provisions PostgreSQL (when needed) and runs the verification.
    - run: ./bin/manager ruby rails-verify --rails ${{ matrix.rails }} --database ${{ matrix.database }}
