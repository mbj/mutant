---
usage: commercial
includes:
- lib
integration:
  name: rspec
requires:
- mutant
- mutant/integration/rspec
- mutant/meta
mutation:
  operators: full
  timeout: 3600.0
coverage_criteria:
  timeout: false
matcher:
  subjects:
  - Mutant*
  ignore:
  - Mutant::Isolation::Fork::Parent#call
  - Mutant::Zombifier#call
  # Mutation only alive for ruby < 3.1
  - Mutant::Mutator::Node::Arguments#anonymous_block_arg?
  - Mutant::Mutator::Node::Arguments#emit_argument_presence
  - Mutant::Mutator::Node::Arguments#removed_block_arg?
  - Mutant::Mutator::Node::BlockPass#dispatch
  # mutation crashes killfork in zombie mode; Timer#now is used by mutant infrastructure
  - Mutant::Timer#now
  # tests use allow instead of expect for configuration.force, .reporter, reset_examples
  - Mutant::Integration::Rspec#setup  # 14 alive
  # no test exercises nil source_location (C-defined methods)
  - Mutant::Matcher::Method::Evaluator#matched_view  # 6 alive
  # no meta spec exercises :kwargs node type; forbid_argument? never returns true in tests
  - Mutant::Mutator::Node::Kwargs#emit_argument_mutations  # 3 alive
  - Mutant::Mutator::Node::Kwargs#forbid_argument?  # 9 alive
  # unkillable: mutate_child on arg nodes within procarg0 produces no observable mutations
  - Mutant::Mutator::Node::ProcargZero#dispatch  # 5 alive
  # thin wrappers delegating to format(); tests verify output not control flow
  - Mutant::Reporter::CLI::Format::Progressive#start  # 10 alive
  - Mutant::Reporter::CLI::Format::Progressive#test_start  # 11 alive
  # tests only cover 1-2 level nesting; deeper nesting needed to kill index/take mutations
  - Mutant::Scope#match_expressions  # 38 alive
  # unkillable: Zombifier is mutant infrastructure in zombie mode; mutations corrupt zombification, crashing the killfork
  - Mutant::Zombifier#include?  # 9 alive
